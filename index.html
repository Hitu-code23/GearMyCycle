  FIXES APPLIED:
  1. ✅ Loader now has a 6s safety fallback — can never get stuck at 0%
  2. ✅ Loader runs immediately, not waiting for full 'load' event
  3. ✅ sNext / sPrev null-checked — won't crash if elements missing
  4. ✅ ttrack / .sdot null-checked throughout
  5. ✅ Testimonial auto-slider null-checked
  6. ✅ Touch swipe null-checked
  7. ✅ Desktop tilt null-checked
  8. ✅ DOMContentLoaded reveal null-checked
  9. ✅ Hash routing null-checked
-->

<script>
/* ══ LOADER ══ */
(function () {
  // Start immediately — don't wait for 'load' event
  let p = 0;
  const pct = document.getElementById('loaderPct');
  const loader = document.getElementById('loader');

  function dismissLoader() {
    if (loader && !loader.classList.contains('done')) {
      loader.classList.add('done');
    }
  }

  // Safety fallback: force-dismiss after 6 seconds no matter what
  const safetyTimer = setTimeout(dismissLoader, 6000);

  const t = setInterval(() => {
    p = Math.min(p + Math.random() * 12, 100);
    if (pct) pct.textContent = Math.floor(p) + '%';
    if (p >= 100) {
      clearInterval(t);
      setTimeout(() => {
        clearTimeout(safetyTimer);
        dismissLoader();
      }, 1200);
    }
  }, 120);

  // Also hook into window.load as a secondary trigger
  window.addEventListener('load', () => {
    // Accelerate progress if load fires
    p = Math.max(p, 80);
  });
})();

/* ══ PAGE NAV ══ */
function showPage(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pg = document.getElementById('page-' + n);
  if (pg) {
    pg.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'auto' });
    setTimeout(initReveal, 60);
  }
  document.querySelectorAll('.nav-links a[data-page]').forEach(a => {
    a.classList.toggle('active-link', a.dataset.page === n);
  });
}

/* ══ MOBILE MENU ══ */
const burger = document.getElementById('burgerBtn');
const drawer = document.getElementById('navDrawer');
const mnav = document.getElementById('mainNav');

if (burger && drawer && mnav) {
  burger.addEventListener('click', () => {
    const o = drawer.classList.toggle('open');
    mnav.classList.toggle('open', o);
    document.body.style.overflow = o ? 'hidden' : '';
  });
}

function closeMenu() {
  if (drawer) drawer.classList.remove('open');
  if (mnav) mnav.classList.remove('open');
  document.body.style.overflow = '';
}

/* ══ CURSOR ══ */
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;

if (window.matchMedia('(pointer:fine)').matches) {
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    if (cur) { cur.style.left = mx + 'px'; cur.style.top = my + 'px'; }
  });
  (function ar() {
    rx += (mx - rx) * .12;
    ry += (my - ry) * .12;
    if (ring) { ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; }
    requestAnimationFrame(ar);
  })();
  document.addEventListener('mouseover', e => {
    if (e.target.closest('a,button,.bike-card,.svc-row,.vc,.wi,.shop-card,.gallery-item,.ride-card,.faq-q'))
      document.body.classList.add('hov');
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('a,button,.bike-card,.svc-row,.vc,.wi,.shop-card,.gallery-item,.ride-card,.faq-q'))
      document.body.classList.remove('hov');
  });
}

/* ══ BACK TO TOP ══ */
const btt = document.getElementById('btt');
if (btt) {
  window.addEventListener('scroll', () => {
    btt.classList.toggle('show', window.scrollY > 400);
  }, { passive: true });
}

/* ══ REVEAL ══ */
function initReveal() {
  document.querySelectorAll('.reveal').forEach(el => el.classList.add('motion-blur-in'));
  const els = document.querySelectorAll('.page.active .reveal:not(.visible)');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: .07, rootMargin: '0px 0px -30px 0px' });
  els.forEach(el => obs.observe(el));
}
initReveal();

/* ══ TESTIMONIAL SLIDER ══ */
let si = 0;

function cardCount() {
  const t = document.getElementById('ttrack');
  return t ? t.querySelectorAll('.tc').length : 4;
}

function updSlider() {
  const t = document.getElementById('ttrack');
  if (!t) return;
  const c = t.querySelector('.tc');
  if (!c) return;
  const gap = window.innerWidth <= 768 ? 0 : 16;
  t.style.transform = `translateX(-${si * (c.offsetWidth + gap)}px)`;
  document.querySelectorAll('.sdot').forEach((d, i) => d.classList.toggle('active', i === si));
}

// ✅ FIX: null-check sNext and sPrev before adding listeners
const sNextBtn = document.getElementById('sNext');
const sPrevBtn = document.getElementById('sPrev');

if (sNextBtn) {
  sNextBtn.addEventListener('click', () => { si = (si + 1) % cardCount(); updSlider(); });
}
if (sPrevBtn) {
  sPrevBtn.addEventListener('click', () => { si = (si - 1 + cardCount()) % cardCount(); updSlider(); });
}

document.querySelectorAll('.sdot').forEach(d => {
  d.addEventListener('click', () => { si = +d.dataset.i; updSlider(); });
});

// Auto-advance testimonials
setInterval(() => {
  const homePage = document.getElementById('page-home');
  if (homePage && homePage.classList.contains('active') && document.getElementById('ttrack')) {
    si = (si + 1) % cardCount();
    updSlider();
  }
}, 5000);

window.addEventListener('resize', updSlider, { passive: true });

/* ══ TOUCH SWIPE ══ */
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 44 && document.getElementById('ttrack')) {
    si = dx < 0 ? (si + 1) % cardCount() : (si - 1 + cardCount()) % cardCount();
    updSlider();
  }
}, { passive: true });

/* ══ DESKTOP TILT ══ */
if (window.matchMedia('(pointer:fine)').matches) {
  document.querySelectorAll('.bike-card').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - .5;
      const y = (e.clientY - r.top) / r.height - .5;
      const inn = card.querySelector('.bci');
      if (inn) inn.style.transform = `scale(1.04) rotateX(${-y * 5}deg) rotateY(${x * 5}deg)`;
    });
    card.addEventListener('mouseleave', () => {
      const inn = card.querySelector('.bci');
      if (inn) inn.style.transform = '';
    });
  });
}

/* ══ ENHANCED ANIMATIONS ══ */
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.reveal').forEach((el, idx) => {
    el.style.animationDelay = `${idx * 0.05}s`;
  });
});

document.querySelectorAll('a[href^="#"]').forEach(link => {
  link.addEventListener('click', e => {
    const target = document.querySelector(link.getAttribute('href'));
    if (target) {
      e.preventDefault();
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
});

/* ══ SHOP FILTER ══ */
function filterShop(cat, btn) {
  document.querySelectorAll('.filt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#shopGrid .shop-card').forEach(c => {
    const show = cat === 'all' || c.dataset.cat === cat;
    c.style.opacity = '0';
    c.style.transition = 'opacity .3s ease';
    setTimeout(() => {
      c.style.display = show ? '' : 'none';
      c.style.opacity = '1';
    }, 50);
  });
}

/* ══ GALLERY FILTER ══ */
function filterGallery(cat, btn) {
  document.querySelectorAll('.gtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#galleryGrid .gallery-item').forEach(c => {
    const show = cat === 'all' || c.dataset.gcat === cat;
    c.style.opacity = '0';
    c.style.transition = 'opacity .3s ease';
    setTimeout(() => {
      c.style.display = show ? '' : 'none';
      c.style.opacity = '1';
    }, 50);
  });
}

/* ══ FAQ ACCORDION ══ */
function toggleFaq(el) {
  const item = el.parentElement;
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(i => {
    if (i !== item) {
      i.classList.remove('open');
      const content = i.querySelector('.faq-a');
      if (content) content.style.maxHeight = '0';
    }
  });
  item.classList.toggle('open', !isOpen);
  const content = item.querySelector('.faq-a');
  if (content) {
    if (!isOpen) {
      content.style.maxHeight = content.scrollHeight + 'px';
      content.style.transition = 'max-height .4s cubic-bezier(.16,1,.3,1)';
    } else {
      content.style.maxHeight = '0';
    }
  }
}

/* ══ FAQ FILTER ══ */
function filterFaq(cat, btn) {
  document.querySelectorAll('.fcat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.faq-item').forEach(i => {
    i.style.display = (cat === 'all' || i.dataset.fcat === cat) ? '' : 'none';
  });
}

/* ══ CONTACT FORM — Formspree ══ */
async function submitForm(e) {
  e.preventDefault();
  const btn = document.getElementById('fsubBtn');
  const status = document.getElementById('cf-status');
  const name = document.getElementById('cf-name') ? document.getElementById('cf-name').value.trim() : '';
  const email = document.getElementById('cf-email') ? document.getElementById('cf-email').value.trim() : '';
  const message = document.getElementById('cf-message') ? document.getElementById('cf-message').value.trim() : '';

  if (!name || !email || !message) {
    if (status) { status.style.color = '#ff6b6b'; status.textContent = 'Please fill in name, email and message.'; }
    return;
  }

  if (btn) { btn.querySelector('span').textContent = 'Sending…'; btn.disabled = true; }
  if (status) status.textContent = '';

  try {
    const res = await fetch('https://formspree.io/f/xayzabcd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        name: name,
        email: email,
        phone: document.getElementById('cf-phone') ? document.getElementById('cf-phone').value : '',
        subject: document.getElementById('cf-subject') ? document.getElementById('cf-subject').value : '',
        message: message
      })
    });
    if (res.ok) {
      if (btn) { btn.querySelector('span').textContent = 'Message Sent ✓'; btn.style.background = 'var(--white)'; }
      if (status) { status.style.color = 'var(--neon)'; status.textContent = "We'll be in touch soon!"; }
      const form = document.getElementById('contactForm');
      if (form) form.querySelectorAll('.fi').forEach(f => f.value = '');
      setTimeout(() => {
        if (btn) { btn.querySelector('span').textContent = 'Send Message →'; btn.style.background = ''; btn.disabled = false; }
        if (status) status.textContent = '';
      }, 4000);
    } else {
      throw new Error('Server error');
    }
  } catch (err) {
    if (btn) { btn.querySelector('span').textContent = 'Send Message →'; btn.disabled = false; }
    if (status) { status.style.color = '#ff6b6b'; status.textContent = 'Something went wrong. Please WhatsApp us directly.'; }
  }
}

/* ══ HASH ROUTING — bookmarkable URLs ══ */
(function () {
  const pages = ['home', 'shop', 'gallery', 'about', 'services', 'faq', 'contact'];

  function applyHash() {
    const hash = location.hash.replace('#', '');
    if (pages.includes(hash)) showPage(hash);
    else showPage('home');
  }

  const _showPage = showPage;
  window.showPage = function (n) {
    _showPage(n);
    if (location.hash !== '#' + n) history.pushState(null, '', '#' + n);
  };

  window.addEventListener('popstate', applyHash);
  if (location.hash) applyHash();
  else history.replaceState(null, '', '#home');
})();
</script>
